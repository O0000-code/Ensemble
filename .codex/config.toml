# ============================================================
# Ensemble Tauri 项目 — Codex 安全配置
# 适用权限级别: Level 2 (PR Creator)
# ============================================================

# 权限配置 — 设为 never 以允许 Automations 自主运行 MCP 工具
# 交互式使用时 Codex 仍受 sandbox_mode 限制
approval_policy = "never"
sandbox_mode = "workspace-write"

# 网络访问（开启：Linear MCP + Git push + npm 需要网络）
[sandbox_workspace_write]
network_access = true

# Shell 环境策略
[shell_environment_policy]
inherit = "core"
set = { NODE_ENV = "development" }

# MCP 服务器配置
[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"

# 项目信任级别
[projects."/Users/bo/Documents/Development/Ensemble/Ensemble2"]
trust_level = "trusted"

# 会话历史
[history]
persistence = "save-all"
